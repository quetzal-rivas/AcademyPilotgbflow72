AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  inbound-mail-parser-service

  A microservice that parses raw email files from S3 and saves the conversations into Firestore.

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: nodejs18.x

Parameters:
  IncomingEmailsBucketName:
    Type: String
    Description: The name of the S3 bucket where SES drops incoming emails.

Resources:
  InboundMailParserFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      Description: Parses raw S3 emails and routes them to Firestore.
      CodeUri: ./
      Policies:
        - AWSLambdaBasicExecutionRole
        - S3ReadPolicy:
            BucketName: !Ref IncomingEmailsBucketName
        # Grant permission to read and decrypt the Firebase Service Account from SSM
        - Statement:
          - Effect: Allow
            Action:
              - ssm:GetParameter
              - ssm:GetParameters
            Resource: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/app/firebase-service-account'
          - Effect: Allow
            Action:
              - kms:Decrypt
            Resource: !Sub 'arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/ssm'
      Environment:
        Variables:
          FIREBASE_SERVICE_ACCOUNT: '/app/firebase-service-account'
          ROOT_DOMAIN: 'graciebarra.ai'

  InboundMailParserFunctionS3Permission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt InboundMailParserFunction.Arn
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub "arn:aws:s3:::${IncomingEmailsBucketName}"
      SourceAccount: !Ref AWS::AccountId

Outputs:
  InboundMailParserFunctionName:
    Description: "The name of the Inbound Mail Parser Lambda function"
    Value: !Ref InboundMailParserFunction
  InboundMailParserFunctionArn:
    Description: "The ARN of the Inbound Mail Parser Lambda function"
    Value: !GetAtt InboundMailParserFunction.Arn
    Export:
      Name: InboundMailParserFunctionArn