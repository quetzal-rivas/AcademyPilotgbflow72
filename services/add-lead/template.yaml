AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Add Lead Service

  This service adds a new lead to the Firestore database.

Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Runtime: nodejs18.x

Resources:
  AddLeadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: addLeadHandler
      CodeUri: ./
      Handler: index.handler
      Policies:
        - VPCAccessPolicy: {}
        # Grant permission to read and decrypt the Firebase Service Account from SSM
        - Statement:
          - Effect: Allow
            Action:
              - ssm:GetParameter
              - ssm:GetParameters
            Resource: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/app/firebase-service-account'
          - Effect: Allow
            Action:
              - kms:Decrypt
            Resource: !Sub 'arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/ssm'
      Environment:
        Variables:
          FIREBASE_SERVICE_ACCOUNT: '/app/firebase-service-account'

Outputs:
  AddLeadFunctionName:
    Description: "The name of the Add Lead function"
    Value: !Ref AddLeadFunction