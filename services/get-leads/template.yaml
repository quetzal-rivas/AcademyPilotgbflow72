AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  get-leads-service

  A microservice to retrieve leads from Firestore, invoked by the Orchestrator.

Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Runtime: nodejs18.x

Resources:
  GetLeadsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      Description: Retrieves leads from Firestore with filtering and sorting.
      CodeUri: ./
      Policies:
        - AWSLambdaBasicExecutionRole
        # Grant permission to read and decrypt the Firebase Service Account from SSM
        - Statement:
          - Effect: Allow
            Action:
              - ssm:GetParameter
              - ssm:GetParameters
            Resource: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/app/firebase-service-account'
          - Effect: Allow
            Action:
              - kms:Decrypt
            Resource: !Sub 'arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/ssm'
      Environment:
        Variables:
          FIREBASE_SERVICE_ACCOUNT: '{{resolve:ssm-secure:/app/firebase-service-account:1}}'

Outputs:
  GetLeadsFunctionName:
    Description: "Get Leads Lambda Function Name"
    Value: !Ref GetLeadsFunction