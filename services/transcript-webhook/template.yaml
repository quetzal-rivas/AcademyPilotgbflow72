AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  transcript-webhook-service

  A microservice that processes end-of-conversation transcripts and triggers outbound calls to the academy for unprocessed leads.

Globals:
  Function:
    Timeout: 15
    MemorySize: 256
    Runtime: nodejs18.x

Parameters:
  TriggerOutboundCallFunctionName:
    Type: String
    Description: The name of the Lambda function responsible for initiating outbound calls.

Resources:
  TranscriptWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      Description: Processes end-of-conversation transcripts.
      CodeUri: ./
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref TriggerOutboundCallFunctionName
        - VPCAccessPolicy: {}
        # Grant permission to read and decrypt the Firebase Service Account from SSM
        - Statement:
          - Effect: Allow
            Action:
              - ssm:GetParameter
              - ssm:GetParameters
            Resource: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/app/firebase-service-account'
          - Effect: Allow
            Action:
              - kms:Decrypt
            Resource: !Sub 'arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/ssm'
      Environment:
        Variables:
          FIREBASE_SERVICE_ACCOUNT: '/app/firebase-service-account'
          TRIGGER_OUTBOUND: 'true' 
          OUTBOUND_LAMBDA_NAME: !Ref TriggerOutboundCallFunctionName

Outputs:
  TranscriptWebhookFunctionName:
    Description: "The name of the Transcript Webhook Lambda function"
    Value: !Ref TranscriptWebhookFunction